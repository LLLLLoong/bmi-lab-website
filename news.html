<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Brain-Machine Intelligence & Interdisciplinary Engineering Laboratory - 脑机智能与交叉工程实验室">
    <title>BMI&IE Lab | 脑机智能与交叉工程实验室</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation -->
    <header id="navbar" class="navbar">
        <div class="nav-container-inner">
            <div class="nav-left">
                <div class="logo-container">
                    <a href="index.html">
                        <img src="assets/logo.png" alt="BMI&IE Lab Logo" class="logo-img" onerror="this.src=''; this.alt='BMI&IE Lab'; this.style.fontSize='20px'; this.style.fontWeight='bold'; this.style.color='#333'; this.style.textDecoration='none';">
                    </a>
                </div>
                <nav class="nav-links">

                <a href="index.html" class="nav-item active">首页</a>
                <a href="research.html" class="nav-item">研究方向</a>
                <a href="team.html" class="nav-item">团队成员</a>
                <a href="publications.html" class="nav-item">科研成果</a>
                <a href="news.html" class="nav-item">实验室动态</a>
                <a href="#join" class="nav-item nav-btn-ghost">加入我们</a>
            
                </nav>
            </div>
            
            <div class="nav-right">
                <button id="search-btn" class="search-btn" aria-label="Search">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div class="mobile-menu-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        
        <!-- Search Overlay Container -->
        <div id="search-overlay" class="search-overlay">
            <div class="search-content">
                <input type="text" id="search-input" placeholder="Search Research, People, News...">
            </div>
        </div>
    </header>

    <!-- Hero Banner Segment -->
    <section id="news" style="padding-top: 140px; min-height: 75vh;" class="news-section">
        <div class="container">
            <div class="section-header fade-up-element">
                <span class="section-subtitle">前沿速递</span>
                <h2 class="section-title">实验室动态</h2>
                <div class="heading-line"></div>
            </div>

            <div class="news-list" id="dynamic-news-list">
                <div style="text-align:center; padding: 80px; font-family: Inter, sans-serif; color: #888;">
                     <div style="display:inline-block; font-size: 24px; animation: pulse 1.5s infinite;">📡</div>
                     <p style="margin-top:20px; font-size: 16px;">引擎轰鸣中，正将数据实时引渡至前台面板...</p>
                 </div>
                 <style>@keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; transform:scale(1.2); } 100% { opacity: 0.3; } }</style>
            </div>
        </div>
    </section>

    <!-- Footer Segment -->
    <footer class="footer fade-up-element">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>BMI&IE Lab</h3>
                    <p>脑机智能与交叉工程实验室</p>
                </div>
                <div class="footer-links">
                    <p>地址：中国 · XX大学 · XX楼</p>
                    <p>邮箱：contact@bmi_ie_lab.edu</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 BMI&IE LAB. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
