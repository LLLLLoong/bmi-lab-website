<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文详情 - BMI&IE Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pub-detail-section {
            padding: 140px 0 80px;
            background-color: var(--white);
            min-height: calc(100vh - 200px);
        }
        .pub-detail-header {
            margin-bottom: 40px;
            padding: 40px;
            background: var(--bg-light);
            border-radius: 12px;
            box-shadow: var(--shadow-light);
        }
        .pub-detail-header .journal {
            font-size: 15px;
            color: var(--primary-gold);
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .pub-detail-header h1 {
            font-size: 26px;
            color: var(--text-dark);
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.4;
        }
        .pub-detail-header .authors {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .pub-detail-content {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }
        .pub-detail-content h2 {
            font-size: 22px;
            color: var(--text-dark);
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 12px;
            margin: 0 0 24px;
            position: relative;
            font-weight: 600;
        }
        .pub-detail-content h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 60px;
            height: 2px;
            background-color: var(--primary-gold);
        }
        .pub-detail-content p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-muted);
            text-align: justify;
            margin-bottom: 16px;
        }
        .pub-detail-content ul, .pub-detail-content ol {
            padding-left: 20px;
            margin-bottom: 20px;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .pub-detail-content li { margin-bottom: 10px; }
        .pub-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .pub-keyword-tag {
            display: inline-block;
            padding: 6px 16px;
            background-color: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 32px;
            transition: var(--transition);
        }
        .back-btn:hover { transform: translateX(-4px); }
    </style>
</head>
<body>
    <header id="navbar" class="navbar">
        <div class="nav-container-inner">
            <div class="nav-left">
                <div class="logo-container">
                    <a href="index.html">
                        <img src="assets/logo.png" alt="BMI&IE Lab Logo" class="logo-img">
                        <span class="logo-text">BMI&amp;IE Lab</span>
                    </a>
                </div>
                <nav class="nav-links">
                    <a href="index.html" class="nav-item">首页</a>
                    <a href="research.html" class="nav-item">研究方向</a>
                    <a href="team.html" class="nav-item">团队成员</a>
                    <a href="publications.html" class="nav-item active">科研成果</a>
                    <a href="news.html" class="nav-item">实验室动态</a>
                </nav>
            </div>
            <div class="nav-right">
                <button id="search-btn" class="search-btn"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
                <div class="mobile-menu-btn"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <section class="pub-detail-section">
        <div class="container">
            <a href="publications.html" class="back-btn">← 返回科研成果</a>
            
            <div id="pub-loading" style="text-align:center; padding: 100px; color:#888;">正在加载论文详情...</div>
            
            <div id="pub-detail-container" style="display:none;">
                <div class="pub-detail-header fade-up-element">
                    <p class="journal" id="pub-journal">-</p>
                    <h1 id="pub-title">-</h1>
                    <p class="authors" id="pub-authors">-</p>
                </div>
                <div class="pub-detail-content fade-up-element" id="pub-content">
                    <!-- WordPress Content (Abstract + Keywords) goes here -->
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand"><h3>BMI&IE Lab</h3><p>脑机智能与交叉工程实验室</p></div>
                <div class="footer-links"><p>地址：中国 · XX大学 · XX楼</p><p>邮箱：contact@bmi_ie_lab.edu</p></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2026 BMI&IE LAB. All Rights Reserved.</p></div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
